# EVM version pinned to Cancun: 0G Chain requires `evm_version = "cancun"`
# (https://docs.0g.ai/developer-hub/building-on-0g/contracts-on-0g/deploy-contracts).
# Solidity pinned so local builds, CI, and testnet deployments compile identically.
# Keys omitted from a named profile fall back to [profile.default].

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.36"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

# Deployment builds: identical language/EVM target, deeper optimization.
# Demo and production runs must never diverge in code shape — window and economic
# parameters are constructor arguments, not compile-time switches.
[profile.production]
optimizer_runs = 10000

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false

# Every deadline in this protocol is a wall-clock window — minutes in a demo, days in production.
# A validator nudging the clock by seconds cannot move a settlement deadline, a fulfilment window
# or a price epoch, so `block.timestamp` comparisons are the intended mechanism, not a hazard.
[lint]
exclude_lints = ["block-timestamp"]
